run:
  go: '1.26'
  timeout: 5m
  concurrency: 2

issues:
  max-issues-per-linter: 50
  max-same-issues: 20
  exclude-dirs:
    - vendor
    - third_party
    - generated
    - tmp
    - testdata

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign

linters-settings:
  govet:
    enable-all: false
    enable:
      - shadow

output:
  formats:
    - name: colored-line-number
      format: colored-line-number
  print-issued-lines: true
  print-linter-name: true